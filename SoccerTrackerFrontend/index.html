<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARISE Soccer Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="phone">

    <header>
      <img src="assets/arise-logo.png" class="logo" alt="ARISE Logo" />
      <h1>Soccer Tracker</h1>
    </header>

    <main>

      <section id="home" class="page active">
        <div class="panel">
          <h2>Today’s Focus</h2>

          <div class="card">
            <h3>Backend Status</h3>
            <p id="backend-status">Checking connection...</p>
          </div>

          <div class="card">
            <h3>Player Overview</h3>
            <div id="players-box">
              <p>Loading players...</p>
            </div>
          </div>

          <button onclick="refreshHome()">Refresh Plan</button>
        </div>
      </section>

      <section id="stats" class="page">
        <div class="panel">
          <h2>Player Stats</h2>
          <div id="stats-box">
            <p>Click Stats to load data.</p>
          </div>
        </div>
      </section>

      <section id="sessions" class="page">
        <div class="panel">
          <h2>Sessions</h2>
          <div id="sessions-box">
            <p>Click Sessions to load data.</p>
          </div>
        </div>
      </section>

      <section id="profile" class="page">
        <div class="panel profile">
          <div class="avatar">⚽</div>
          <h2>Profile</h2>

          <div id="profile-box">
            <p>Click Profile to load player profile.</p>
          </div>
        </div>
      </section>

    </main>

    <nav>
      <button class="nav-btn active" onclick="showPage('home', this)">
        🏠
        <span>Home</span>
      </button>

      <button class="nav-btn" onclick="showPage('stats', this)">
        📊
        <span>Stats</span>
      </button>

      <button class="nav-btn" onclick="showPage('sessions', this)">
        ⚽
        <span>Sessions</span>
      </button>

      <button class="nav-btn" onclick="showPage('profile', this)">
        👤
        <span>Profile</span>
      </button>
    </nav>

  </div>

  <script src="script.js"></script>
</body>
</html>
