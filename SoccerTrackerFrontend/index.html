<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>
ARISE Soccer Tracker
</title>

<link
rel="stylesheet"
href="style.css"
/>

</head>

<body>

<div class="phone">

<header>

<div class="hero">

<img
src="assets/ARISE-logo.png"
class="logo"
alt="ARISE Logo"
/>

<h1>
Soccer Tracker
</h1>

<p>
Train • Track • Improve
</p>

</div>

</header>


<main>

<section
id="home"
class="page active"
>

<div class="panel">

<h2>
Today’s Focus
</h2>

<div class="card">

<h3>
Backend Status
</h3>

<p id="backend-status">
Connecting...
</p>

</div>

<div class="card">

<h3>
Player Overview
</h3>

<div id="players-box">

Loading players...

</div>

</div>

<button
onclick="refreshHome()"
>

Refresh Plan

</button>

</div>

</section>


<section
id="stats"
class="page"
>

<div class="panel">

<h2>
Player Stats
</h2>

<div id="stats-box">

Loading stats...

</div>

</div>

</section>


<section
id="sessions"
class="page"
>

<div class="panel">

<h2>
Sessions
</h2>

<div id="sessions-box">

Loading sessions...

</div>

</div>

</section>


<section
id="profile"
class="page"
>

<div class="panel profile">

<div class="avatar">

⚽

</div>

<h2>

Profile

</h2>

<div id="profile-box">

Loading profile...

</div>

</div>

</section>

</main>


<nav>

<button
class="nav-btn active"
onclick="showPage('home',this)"
>

🏠

<span>
Home
</span>

</button>


<button
class="nav-btn"
onclick="showPage('stats',this)"
>

📊

<span>
Stats
</span>

</button>


<button
class="nav-btn"
onclick="showPage('sessions',this)"
>

⚽

<span>
Sessions
</span>

</button>


<button
class="nav-btn"
onclick="showPage('profile',this)"
>

👤

<span>
Profile
</span>

</button>

</nav>

</div>

<script src="script.js"></script>

</body>

</html>
