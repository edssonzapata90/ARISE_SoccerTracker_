<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1">

<title>

Create Account

</title>

<link
rel="stylesheet"
href="form-auth.css">

</head>

<body>

<div class="auth-card">

<img
src="assests/ARISE-logo1.png"
class="logo">

<h1>

Create Account

</h1>

<input
id="name"
placeholder="Name">

<input
id="position"
placeholder="Position">

<input
id="foot"
placeholder="Dominant Foot">

<input
id="email"
type="email"
placeholder="Email">

<input
id="password"
type="password"
placeholder="Password">

<button
onclick="signup()">

Create Account

</button>

<p>

Already have account?

<a href="login.html">

Login

</a>

</p>

</div>

<script src="auth.js"></script>

</body>

</html>
