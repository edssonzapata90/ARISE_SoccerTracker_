<!DOCTYPE html>

<html>

<head>

<title>Create Account</title>

<link
rel="stylesheet"
href="auth.css">

</head>

<body>

<div class="auth">

<img
src="ARISE-logo.png"
class="logo">

<h1>Create Account</h1>

<input
id="name"
placeholder="Name">

<input
id="position"
placeholder="Position">

<input
id="foot"
placeholder="Dominant Foot">

<input
id="email"
placeholder="Email">

<input
id="password"
type="password"
placeholder="Password">

<button
onclick="signup()">

Create Account

</button>

<p>

Already have account?

<a
href="login.html">

Login

</a>

</p>

</div>

<script src="auth.js"></script>

</body>

</html>
