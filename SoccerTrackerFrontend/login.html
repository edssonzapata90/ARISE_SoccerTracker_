<!DOCTYPE html>

<html>

<head>

<title>ARISE Login</title>

<link rel="stylesheet"
href="auth.css">

</head>

<body>

<div class="auth">

<img
src="ARISE-logo.png"
class="logo">

<h1>Welcome Back</h1>

<input
id="email"
type="email"
placeholder="Email">

<input
id="password"
type="password"
placeholder="Password">

<button
onclick="login()">

Login

</button>

<p>

No account?

<a
href="signup.html">

Create one

</a>

</p>

</div>

<script src="auth.js"></script>

</body>

</html>
